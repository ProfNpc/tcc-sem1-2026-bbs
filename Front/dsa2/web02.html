<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Bits Bytes Store</title>
<style>
  body{
      font-family: Arial;
      margin:0;
      background:#0d0d0d;
      color:#e6e6e6;
  }
  /* HEADER */
  header{
      background:#1a1a1a;
      color:#ff1a1a;
      padding:20px;
      text-align:center;
      border-bottom:2px solid #ff1a1a;
  }
  /* TOPO: BUSCA + FILTRO */
  .topo{
      display:flex;
      justify-content:flex-start;
      align-items:center;
      padding:20px;
      max-width:1200px;
      margin:auto;
      gap:10px;
  }
  /* CAMPO DE BUSCA */
  .topo input{
      flex:2;
      padding:12px;
      border-radius:5px;
      border:none;
      outline:none;
      font-size:16px;
  }
  /* BOTÃO FILTRO */
  .filtro-btn{
      padding:12px 20px;
      background:#ff1a1a;
      border:none;
      color:white;
      cursor:pointer;
      border-radius:5px;
      position:relative;
  }
  /* MENU DROPDOWN */
  .dropdown{
      position:absolute;
      top:50px;
      left:0;
      background:#1a1a1a;
      border:1px solid #ff1a1a;
      border-radius:8px;
      display:none;
      flex-direction:column;
      min-width:180px;
      z-index:10;
  }
  .dropdown button{
      background:none;
      border:none;
      color:white;
      padding:10px;
      text-align:left;
      cursor:pointer;
  }
  .dropdown button:hover{
      background:#ff1a1a;
  }
  /* PRODUTOS */
  .container{
      display:grid;
      grid-template-columns: repeat(4,1fr);
      gap:20px;
      padding:20px;
      max-width:1200px;
      margin:auto;
  }
  .produto{
      background:#1a1a1a;
      padding:15px;
      border-radius:10px;
      text-align:center;
      border:1px solid #330000;
      transition:0.3s;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
  }
  /* HOVER PRODUTO */
  .produto:hover{
      transform:translateY(-5px) scale(1.05);
      border:1px solid #ff1a1a;
      box-shadow:0 0 15px #ff1a1a55;
  }
  .produto img{
      width: 100%;
      height: 150px;
      object-fit: contain;
      border-radius:8px;
      transition:0.3s;
  }
  .produto:hover img{
      transform:scale(1.08);
  }
  .preco{
      color:#00ff88;
      font-weight:bold;
      margin:10px 0;
  }
  /* BOTÕES COMPRAR + DESCRIÇÃO */
  .btns-produto{
      display:flex;
      gap:10px;
      margin-top:10px;
  }
  .produto button{
      background:#ff1a1a;
      color:white;
      border:none;
      padding:12px;
      flex:1;
      font-size:16px;
      font-weight:bold;
      border-radius:5px;
      cursor:pointer;
      transition:0.3s;
  }
  .produto button:hover{
      background:#cc0000;
      box-shadow:0 0 10px #ff1a1a;
      transform:scale(1.05);
  }
  /* MODAL */
  .modal{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
      z-index:20;
  }
  .modal-content{
      background:#1a1a1a;
      padding:20px;
      border-radius:10px;
      max-width:800px;
      width:90%;
      display:flex;
      gap:20px;
      position:relative;
      color:#e6e6e6;
  }
  .modal-content img{
      width: 350px;
      height: 230px;
      object-fit: contain;
      border-radius:8px;
  }
  .modal-info {
      flex:1;
      display:flex;
      flex-direction: column;
      justify-content: center;
  }
  .modal-info h3{
      margin:0 0 15px 0;
  }
  .modal-info p{
      line-height:1.4;
      font-size: 1.1rem;
  }
  /* BOTÃO FECHAR MODAL */
  .close-btn{
      position:absolute;
      top:10px;
      right:15px;
      background:#ff1a1a;
      border:none;
      color:white;
      padding:5px 10px;
      font-weight:bold;
      cursor:pointer;
      border-radius:5px;
      font-size: 18px;
      line-height: 1;
  }
  .close-btn:hover{
      background:#cc0000;
  }
  /* BOTÕES DE NAVEGAÇÃO NO MODAL */
  .nav-btn{
      position:absolute;
      top:50%;
      background:#ff1a1a;
      border:none;
      color:white;
      padding:10px 15px;
      border-radius:50%;
      font-size: 20px;
      cursor:pointer;
      user-select:none;
      transform: translateY(-50%);
      transition: background 0.3s;
  }
  .nav-btn:hover{
      background:#cc0000;
  }
  .nav-prev{
      left:10px;
  }
  .nav-next{
      right:10px;
  }
  /* RESPONSIVO */
  @media(max-width:900px){
      .container{
          grid-template-columns: repeat(2,1fr);
      }
      .modal-content{
          flex-direction: column;
          align-items: center;
          max-width: 90%;
      }
      .modal-content img{
          width: 80%;
          height: auto;
      }
      .modal-info {
          width: 100%;
          margin-top: 15px;
          text-align: center;
      }
      .nav-btn {
          top:auto;
          bottom: 10px;
          transform: none;
          position: static;
          margin: 5px;
      }
  }
  @media(max-width:500px){
      .container{
          grid-template-columns:1fr;
      }
      .topo{
          flex-direction: column;
          align-items: stretch;
      }
      .topo input{
          width:100%;
          margin-bottom:10px;
      }
      .filtro-btn{
          width:100%;
      }
      .dropdown{
          left:0;
      }
  }
</style>
</head>
<body>

<header>
  <h1>Bits Bytes Store</h1>
  <p>Hardware com alto desempenho e custo-benefício</p>
</header>

<!-- TOPO -->
<div class="topo">
  <input type="text" id="buscar" placeholder="Buscar produto..." onkeyup="pesquisar()">
  <div style="position:relative;">
      <button class="filtro-btn" onclick="toggleFiltro(event)">Filtros</button>
      <div class="dropdown" id="menuFiltro">
          <button onclick="filtrar('todos')">Todos</button>
          <button onclick="filtrar('placa-mae')">Placa-mãe</button>
          <button onclick="filtrar('processador')">Processadores</button>
          <button onclick="filtrar('gpu')">Placa de Vídeo</button>
          <button onclick="filtrar('ram')">Memória RAM</button>
          <button onclick="filtrar('armazenamento')">Armazenamento</button>
      </div>
  </div>
</div>

<!-- PRODUTOS -->
<div class="container">
  <!-- Produto 1 -->
  <div class="produto placa-mae"
       data-nome="Placa-mãe B550"
       data-info="Processador compatível: AMD Ryzen 3/5/7 | Slots DDR4 até 128GB | NVMe M.2 2280 | Suporte CrossFire"
       data-imgs='["https://via.placeholder.com/350x230?text=B550"]'>
    <img src="https://via.placeholder.com/150?text=B550" alt="Placa-mãe B550">
    <h3>Placa-mãe B550</h3>
    <p>AMD | NVMe | DDR4</p>
    <span class="preco">R$ 750,00</span>
    <div class="btns-produto">
        <button onclick="abrirModal(this)">Descrição</button>
        <button>Comprar</button>
    </div>
  </div>

  <!-- Produto 2 -->
  <div class="produto processador"
       data-nome="Processador AMD Ryzen 5 5600"
       data-info="6 núcleos, 12 threads, clock até 4.4GHz, cache 35MB, AM4 socket, compatível com DDR4"
       data-imgs='["https://via.placeholder.com/350x230?text=Ryzen+5+5600"]'>
    <img src="https://via.placeholder.com/150?text=Ryzen+5+5600" alt="Ryzen 5 5600">
    <h3>Ryzen 5 5600</h3>
    <p>AMD | AM4 | DDR4</p>
    <span class="preco">R$ 899,99</span>
    <div class="btns-produto">
        <button onclick="abrirModal(this)">Descrição</button>
        <button>Comprar</button>
    </div>
  </div>

  <!-- Produto 3 -->
  <div class="produto gpu"
       data-nome="Placa de Vídeo RTX 3060"
       data-info="12GB GDDR6, Ray Tracing, Suporte NVIDIA DLSS, HDMI 2.1, PCIe 4.0"
       data-imgs='["https://via.placeholder.com/350x230?text=RTX+3060"]'>
    <img src="https://via.placeholder.com/150?text=RTX+3060" alt="RTX 3060">
    <h3>RTX 3060</h3>
    <p>12GB GDDR6</p>
    <span class="preco">R$ 2199,99</span>
    <div class="btns-produto">
        <button onclick="abrirModal(this)">Descrição</button>
        <button>Comprar</button>
    </div>
  </div>

  <!-- Produto 4 -->
  <div class="produto ram"
       data-nome="Memória RAM 16GB DDR4"
       data-info="DDR4 3200MHz, 1x16GB, Baixa latência, Ideal para jogos e produtividade"
       data-imgs='["https://via.placeholder.com/350x230?text=RAM+16GB"]'>
    <img src="https://via.placeholder.com/150?text=RAM+16GB" alt="RAM 16GB">
    <h3>RAM 16GB</h3>
    <p>DDR4 3200MHz</p>
    <span class="preco">R$ 320,00</span>
    <div class="btns-produto">
        <button onclick="abrirModal(this)">Descrição</button>
        <button>Comprar</button>
    </div>
  </div>

  <!-- Produto 5 - SSD com slider -->
  <div class="produto armazenamento"
       data-nome="SSD NVMe 1TB"
       data-info='[
          "Leitura até 5000MB/s, Gravação 3000MB/s, Alta durabilidade, Ideal para jogos e edição",
          "SSD com alta velocidade e eficiência energética, perfeito para sistemas pesados",
          "Design compacto com excelente performance, garantia de 5 anos"
       ]'
       data-imgs='[
          "https://m.media-amazon.com/images/I/71c5uuoM1bL._AC_SL1500_.jpg",
          "https://m.media-amazon.com/images/I/71McEoadFVL._AC_SX679_.jpg",
          "https://m.media-amazon.com/images/I/81DaDy+MKFL._AC_SX679_.jpg"
       ]'>
    <img src="https://m.media-amazon.com/images/I/71c5uuoM1bL._AC_SL1500_.jpg" alt="SSD NVMe 1TB">
    <h3>SSD NVMe 1TB</h3>
    <p>Alta velocidade</p>
    <span class="preco">R$ 449,99</span>
    <div class="btns-produto">
        <button onclick="abrirModal(this)">Descrição</button>
        <button>Comprar</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modalDescricao">
  <div class="modal-content">
    <button class="close-btn" onclick="fecharModal()">X</button>
    <button class="nav-btn nav-prev" onclick="anterior()">‹</button>
    <button class="nav-btn nav-next" onclick="proximo()">›</button>
    <img id="modalImg" src="" alt="Imagem do produto" />
    <div class="modal-info">
      <h3 id="modalNome"></h3>
      <p id="modalInfo"></p>
    </div>
  </div>
</div>

<script>
  // Variáveis globais para controlar modal e slider
  let modalAberto = false;
  let imagens = [];
  let infos = [];
  let indiceAtual = 0;

  // TOGGLE FILTRO
  function toggleFiltro(event){
      event.stopPropagation();
      let menu = document.getElementById("menuFiltro");
      menu.style.display = menu.style.display === "flex" ? "none" : "flex";
  }

  // Fecha o dropdown se clicar fora
  document.addEventListener('click', function(event){
      let menu = document.getElementById("menuFiltro");
      let button = document.querySelector('.filtro-btn');
      if(menu.style.display === "flex" && !menu.contains(event.target) && !button.contains(event.target)){
          menu.style.display = "none";
      }
  });

  // FILTRO POR CATEGORIA
  function filtrar(categoria){
      let produtos = document.querySelectorAll('.produto');
      produtos.forEach(produto => {
          produto.style.display = categoria === 'todos' || produto.classList.contains(categoria) ? 'block' : 'none';
      });
  }

  // BUSCA
  function pesquisar(){
      let input = document.getElementById('buscar').value.toLowerCase();
      let produtos = document.querySelectorAll('.produto');
      produtos.forEach(produto => {
          let texto = produto.innerText.toLowerCase();
          produto.style.display = texto.includes(input) ? 'block' : 'none';
      });
  }

  // ABRE MODAL
  function abrirModal(btn){
      let produto = btn.closest('.produto');
      const nome = produto.dataset.nome;
      
      // Pega array de imagens e infos, ou cria array único para produtos simples
      try {
        imagens = JSON.parse(produto.dataset.imgs);
      } catch(e) {
        imagens = [produto.dataset.imgs];
      }
      
      try {
        infos = JSON.parse(produto.dataset.info);
      } catch(e) {
        infos = [produto.dataset.info];
      }

      indiceAtual = 0;
      modalAberto = true;

      atualizarModal();
      document.getElementById('modalNome').innerText = nome;
      document.getElementById('modalDescricao').style.display = 'flex';
  }

  // Atualiza conteúdo do modal
  function atualizarModal(){
      document.getElementById('modalImg').src = imagens[indiceAtual];
      document.getElementById('modalInfo').innerText = infos[indiceAtual];
  }

  // Navega para próxima imagem e descrição
  function proximo(){
      if(!modalAberto) return;
      indiceAtual = (indiceAtual + 1) % imagens.length;
      atualizarModal();
  }

  // Navega para imagem e descrição anterior
  function anterior(){
      if(!modalAberto) return;
      indiceAtual = (indiceAtual - 1 + imagens.length) % imagens.length;
      atualizarModal();
  }

  // Fecha modal
  function fecharModal(){
      document.getElementById('modalDescricao').style.display = 'none';
      modalAberto = false;
  }

  // Fecha modal clicando fora do conteúdo
  document.getElementById('modalDescricao').addEventListener('click', function(e){
      if(e.target === this) fecharModal();
  });
</script>

</body>
</html>
