<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Bits Bytes Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Trocado o vermelho sólido por um tema de gradiente mais premium */
            --primary: #ff416c;
            --primary-gradient: linear-gradient(45deg, #ff416c, #ff4b2b);
            --glass-bg: rgba(20, 20, 20, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background-color: #050505;
            /* Fundo com animação suave */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 65, 108, 0.15), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(255, 75, 43, 0.15), transparent 40%);
            background-size: 200% 200%;
            animation: moveBg 10s ease-in-out infinite alternate, fadeInPage 1s ease-out;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes moveBg {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* --- CONTAINER PRINCIPAL --- */
        .login {
            width: 100%;
            max-width: 380px;
            padding: 45px 40px;
            background: var(--glass-bg);
            border-radius: 24px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
            z-index: 1;
            transition: opacity 0.4s ease;
        }

        .tex { 
            color: var(--text-main); 
            font-size: 32px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            margin-bottom: 35px; 
            text-transform: uppercase; 
            margin-top: 0;
        }
        
        .tex span { 
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 20px rgba(255, 65, 108, 0.4); 
        }

        form { 
            display: flex; 
            flex-direction: column; 
            gap: 18px; 
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 14px;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input::placeholder { color: #777; }

        input:focus { 
            outline: none; 
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 65, 108, 0.5); 
            box-shadow: 0 0 20px rgba(255, 65, 108, 0.15); 
        }

        .btn-entrar {
            width: 100%;
            padding: 16px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 5px;
            box-shadow: 0 8px 20px rgba(255, 65, 108, 0.25);
        }

        .btn-entrar:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 12px 25px rgba(255, 65, 108, 0.4); 
        }

        .btn-entrar:active {
            transform: translateY(0);
        }

        /* --- MODAIS (CADASTRO E RECUPERAÇÃO) --- */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            animation: fadeInModal 0.3s ease forwards;
        }

        @keyframes fadeInModal { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }

        .modal-content {
            background: var(--glass-bg);
            width: 100%;
            max-width: 380px;
            padding: 45px 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
            transform: scale(0.95);
            animation: scaleUp 0.3s ease forwards;
            box-sizing: border-box;
        }

        @keyframes scaleUp {
            to { transform: scale(1); }
        }

        .modal-content h2 { 
            color: var(--text-main); 
            margin-bottom: 15px; 
            font-size: 22px; 
            font-weight: 600;
            margin-top: 0;
        }
        
        .modal-content p { 
            color: var(--text-muted); 
            font-size: 14px; 
            margin-bottom: 25px; 
            line-height: 1.5;
        }

        .btn-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            margin-top: 25px;
            transition: color 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-close:hover {
            color: var(--text-main);
            text-decoration: underline;
        }

        /* --- LOADER --- */
        #loader { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 30px;
        }
        
        .spinner { 
            width: 45px; 
            height: 45px; 
            border: 4px solid rgba(255, 65, 108, 0.15); 
            border-left-color: var(--primary); 
            border-radius: 50%; 
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite; 
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        .extra-links { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 20px; 
        }
        
        .link-btn { 
            background: none; 
            border: none; 
            color: var(--text-muted); 
            font-family: 'Poppins', sans-serif; 
            font-size: 13px; 
            cursor: pointer; 
            transition: 0.3s ease; 
            padding: 0;
        }
        
        .link-btn:hover { color: var(--text-main); }
        .link-btn.highlight { color: var(--primary); font-weight: 500; }
        .link-btn.highlight:hover { filter: brightness(1.2); text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login" id="loginCard">
        <h1 class="tex">BBS <span>LOGIN</span></h1>
        
        <div id="loader">
            <div class="spinner"></div>
            <p style="color: var(--primary); font-weight: 600; font-size: 12px; letter-spacing: 3px; margin: 0;">VERIFICANDO...</p>
        </div>

        <form id="loginForm">
            <input type="text" id="user" placeholder="Usuário" required />
            <input type="password" id="pass" placeholder="Senha" required />
            <button type="submit" class="btn-entrar">Acessar</button>

            <div class="extra-links">
                <button type="button" class="link-btn highlight" onclick="openModal('modalCadastro')">Criar Conta</button>
                <button type="button" class="link-btn" onclick="openModal('modalSenha')">Esqueceu a senha?</button>
            </div>
        </form>
    </div>

    <div id="modalCadastro" class="modal">
        <div class="modal-content">
            <h2>Novo Cadastro</h2>
            <form onsubmit="event.preventDefault(); alert('Conta criada com sucesso! Faça login.'); closeModal('modalCadastro')">
                <input type="text" placeholder="Nome Completo" required />
                <input type="email" placeholder="E-mail" required />
                <input type="password" placeholder="Crie uma Senha" required />
                <button type="submit" class="btn-entrar">Finalizar Cadastro</button>
            </form>
            <button type="button" class="btn-close" onclick="closeModal('modalCadastro')">Voltar ao Login</button>
        </div>
    </div>

    <div id="modalSenha" class="modal">
        <div class="modal-content">
            <h2>Recuperar Acesso</h2>
            <p>Enviaremos um link de recuperação para o seu e-mail cadastrado.</p>
            <form onsubmit="event.preventDefault(); alert('Link enviado para o seu e-mail!'); closeModal('modalSenha')">
                <input type="email" placeholder="Digite seu E-mail" required />
                <button type="submit" class="btn-entrar">Enviar Link</button>
            </form>
            <button type="button" class="btn-close" onclick="closeModal('modalSenha')">Voltar ao Login</button>
        </div>
    </div>

    <script>
        // Lógica de Login com Animação
        document.getElementById("loginForm").addEventListener("submit", function(e){
            e.preventDefault();
            const user = document.getElementById("user").value.trim();
            const pass = document.getElementById("pass").value.trim();
            
            if(user === "admin" && pass === "1234"){
                // Transição suave para o loader
                const form = document.getElementById("loginForm");
                form.style.opacity = "0";
                
                setTimeout(() => {
                    form.style.display = "none";
                    document.getElementById("loader").style.display = "flex";
                }, 300);
                
                setTimeout(() => {
                    localStorage.setItem("logado", "true");
                    document.getElementById("loginCard").style.opacity = "0";
                    setTimeout(() => { window.location.href = "nsei.html"; }, 500);
                }, 2000); 
            } else {
                alert("Usuário ou senha incorretos!");
            }
        });

        // Funções para os Modais
        function openModal(id) { 
            document.getElementById(id).style.display = 'flex'; 
        }
        
        function closeModal(id) { 
            const modal = document.getElementById(id);
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.style.display = 'none';
                modal.style.opacity = '1'; // Reseta para a próxima vez
            }, 300);
        }

        // Fechar modal clicando fora dele
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                closeModal(event.target.id);
            }
        }
    </script>
</body>
</html>
