<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login BBS</title>
  <style>
    /* Fundo geral */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 0, 0, 0.3), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(196, 1, 1, 0.336), transparent 40%),
        linear-gradient(135deg, #000000, #1a0000, #330000);
      position: relative;
    }

    /* Listras animadas */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        90deg,
        rgba(0, 0, 0, 0.2) 0px,
        rgba(0, 0, 0, 0.2) 2px,
        transparent 2px,
        transparent 40px
      );
      animation: mover 10s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes mover {
      from { transform: translateX(0); }
      to { transform: translateX(100px); }
    }

    /* Caixa do login */
    .login {
      width: 400px;
      height: 550px;
      padding: 20px;
      background: rgba(247, 112, 112, 0.438);
      border-radius: 20px;
      backdrop-filter: blur(25px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Título do login ajustado verticalmente */
    .tex {
      color: white;
      text-shadow: 0 0 10px red, 0 0 20px red;
      font-size: 28px;
      margin-bottom: 10px;  /* mantém distância do form */
      margin-top: -20px;    /* move o título um pouco mais para cima */
    }

    /* Formulário */
    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    input,
    button {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    input {
      background: rgba(255, 255, 255, 0.3);
      color: white;
    }

    input::placeholder {
      color: white;
      opacity: 1;
    }

    button {
      background: red;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: darkred;
      box-shadow: 0 0 10px red;
    }

    /* Botões extras */
    .extra-buttons {
      display: flex;
      justify-content: space-between;
      width: 80%;
      margin-top: 10px;
    }

    .extra-buttons button {
      width: 48%;
      background: red;
      font-weight: bold;
    }

    .extra-buttons button:hover {
      background: darkred;
      box-shadow: 0 0 10px red;
    }

  </style>
</head>

<body>
  <div class="login">
    <h1 class="tex">LOGIN BBS</h1>
    <form>
      <input type="text" placeholder="Usuário" required />
      <input type="password" placeholder="Senha" required />
      <button type="submit">Entrar</button>

      <!-- Novos botões -->
      <div class="extra-buttons">
        <button type="button">Cadastrar-se</button>
        <button type="button">Esqueci senha</button>
      </div>
    </form>
  </div>
  <script>
document.querySelector("form").addEventListener("submit", function(e){
    e.preventDefault();

    const user = document.querySelector("input[type='text']").value.trim();
    const pass = document.querySelector("input[type='password']").value.trim();

    if(user === "admin" && pass === "1234"){
        localStorage.setItem("logado", "true");
        window.location.href = "sla2.html";
    } else {
        alert("Usuário ou senha inválidos");
    }
});
</script>
</body>
</html>
