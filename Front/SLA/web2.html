<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bits Bytes Store | Hardware Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
   
    <style>
        /* --- VARIÁVEIS DE CORES E ESTILOS PREMIUM --- */
        :root {
            --primary: #ff416c;
            --primary-gradient: linear-gradient(45deg, #ff416c, #ff4b2b);
            --primary-hover: #ff4b2b;
            --bg-base: #050505;
            --glass-bg: rgba(20, 20, 20, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(25, 25, 25, 0.6);
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --success: #00ff88;
        }

        /* --- CONFIGURAÇÕES GERAIS --- */
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: var(--bg-base);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(255, 65, 108, 0.08), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(255, 75, 43, 0.08), transparent 40%);
            background-attachment: fixed;
            background-size: 200% 200%;
            animation: moveBg 15s ease-in-out infinite alternate;
            color: var(--text);
            overflow-x: hidden;
        }

        @keyframes moveBg {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* --- CABEÇALHO E MENU --- */
        header {
            background: var(--glass-bg);
            padding: 1.2rem 5%;
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 4px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(255, 65, 108, 0.3);
        }
        nav { display: flex; gap: 30px; align-items: center; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .cart-btn-nav {
            position: relative; cursor: pointer; background: rgba(255,255,255,0.05);
            padding: 10px 25px; border-radius: 30px; border: 1px solid var(--glass-border);
            font-weight: 600; transition: 0.3s;
        }
        #cart-count {
            background: var(--primary-gradient); color: white; border-radius: 50%;
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; position: absolute; top: -8px; right: -8px;
            box-shadow: 0 0 10px rgba(255, 65, 108, 0.5);
        }

        /* --- CARRINHO LATERAL --- */
        #cart-sidebar {
            position: fixed; top: 0; right: -450px; width: 400px; height: 100%;
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(25px);
            box-shadow: -15px 0 50px rgba(0,0,0,0.8); z-index: 4000;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; border-left: 1px solid var(--glass-border);
        }
        #cart-sidebar.open { right: 0; }
        .cart-header { padding: 30px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .cart-items-list { flex: 1; overflow-y: auto; padding: 25px; }
        .cart-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); }
        .cart-item img { width: 70px; height: 70px; object-fit: contain; background: #fff; padding: 5px; border-radius: 10px; }

        /* --- BUSCA E FILTROS --- */
        .topo-container { width: 90%; max-width: 1400px; margin: 40px auto 10px; display: flex; gap: 20px; }
        .topo-container input {
            flex: 1; padding: 20px 30px; border-radius: 15px; border: 1px solid var(--glass-border);
            background: var(--glass-bg); color: white; font-size: 1.1rem; outline: none;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .btn-filtro-master {
            background: var(--primary-gradient); color: white; border: none; padding: 0 35px;
            border-radius: 15px; cursor: pointer; font-weight: 700; text-transform: uppercase;
        }

        .painel-filtros {
            width: 90%; max-width: 1400px; margin: 20px auto; padding: 30px;
            background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border);
            display: none; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px;
        }

        /* --- CARDS DE PRODUTOS E SLIDESHOW --- */
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 35px; width: 90%; max-width: 1400px; margin: 50px auto; }
        .produto {
            background: var(--card-bg); padding: 25px; border-radius: 24px;
            border: 1px solid var(--glass-border); text-align: center; display: flex;
            flex-direction: column; transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }
        .produto:hover { border-color: rgba(255, 65, 108, 0.5); transform: translateY(-10px); }
        
        .img-container {
            width: 100%; height: 220px; background: #fff; border-radius: 18px;
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; padding: 10px; box-sizing: border-box; position: relative;
        }
        /* Estilo para suportar várias fotos no mesmo card */
        .img-produto { 
            max-width: 90%; max-height: 90%; object-fit: contain; 
            transition: opacity 0.8s ease; mix-blend-mode: multiply;
            position: absolute; opacity: 0;
        }
        .img-produto.active { opacity: 1; position: relative; }

        .preco { color: var(--success); font-size: 2rem; font-weight: 800; margin: 20px 0; margin-top: auto; }
        .btns-produto { display: flex; flex-direction: column; gap: 12px; }
        .btns-produto button { width: 100%; padding: 18px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; font-size: 1rem; text-transform: uppercase; transition: 0.3s; }
        .btn-buy { background: var(--primary-gradient); color: white; }
        .btn-info { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); }

        /* --- CHAT IA (MODIFICADO PARA O LADO ESQUERDO) --- */
        #ai-chat-container {
            position: fixed; bottom: 30px; left: 30px; z-index: 6000;
            display: flex; flex-direction: column; align-items: flex-start;
        }
        #ai-chat-btn {
            width: 70px; height: 70px; border-radius: 50%; background: var(--primary-gradient);
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(255, 65, 108, 0.4); font-size: 1.8rem; transition: 0.3s;
        }
        #ai-window {
            width: 350px; height: 500px; background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 20px; margin-bottom: 20px; display: none; flex-direction: column;
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .ai-header { padding: 20px; background: var(--primary-gradient); color: white; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        #ai-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 10px 15px; border-radius: 12px; max-width: 80%; font-size: 0.9rem; line-height: 1.4; }
        .msg.bot { background: rgba(255,255,255,0.05); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.user { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; color: white; }
        .ai-input-area { padding: 15px; border-top: 1px solid var(--glass-border); display: flex; gap: 10px; }
        .ai-input-area input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; padding: 10px; color: white; outline: none; }
        .ai-input-area button { background: var(--primary); border: none; padding: 10px 15px; border-radius: 10px; color: white; cursor: pointer; }

        /* --- SEÇÕES E MODAL --- */
        .section-container { width: 90%; max-width: 1100px; margin: 80px auto; padding: 60px 50px; background: var(--glass-bg); border-radius: 25px; border: 1px solid var(--glass-border); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); justify-content: center; align-items: center; z-index: 5000; }
        .modal-content { background: var(--glass-bg); border-radius: 24px; display: grid; grid-template-columns: 1fr 1fr; max-width: 900px; width: 100%; border: 1px solid var(--glass-border); overflow: hidden; }

        footer { padding: 40px; text-align: center; color: var(--text-muted); border-top: 1px solid var(--glass-border); margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <h1>BBS</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#produtos">Produtos</a>
        <a href="#sobre">Sobre</a>
        <a href="#contato">Contato</a>
        <div class="cart-btn-nav" onclick="toggleCart()">🛒 Carrinho <span id="cart-count">0</span></div>
    </nav>
</header>

<aside id="cart-sidebar">
    <div class="cart-header"><h2>Meu Setup</h2><button onclick="toggleCart()" style="background:none; border:none; color:white; font-size:2.5rem; cursor:pointer;">&times;</button></div>
    <div class="cart-items-list" id="cart-items"></div>
    <div style="padding: 30px; border-top: 1px solid var(--glass-border);">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:700;"><span>Total:</span><span id="cart-total">R$ 0,00</span></div>
        <button class="btn-buy" style="width:100%; padding:20px; border-radius: 12px;">Finalizar Pedido</button>
    </div>
</aside>

<div id="ai-chat-container">
    <div id="ai-window">
        <div class="ai-header"><span>BBS AI ASSISTANT</span><button onclick="toggleAI()" style="background:none; border:none; color:white; cursor:pointer;">✕</button></div>
        <div id="ai-messages"><div class="msg bot">Olá! Sou o assistente da Bits & Bytes. Como posso ajudar?</div></div>
        <div class="ai-input-area">
            <input type="text" id="ai-input" placeholder="Pergunte algo...">
            <button onclick="sendAIMessage()">➤</button>
        </div>
    </div>
    <button id="ai-chat-btn" onclick="toggleAI()">🤖</button>
</div>

<main id="home">
    <div class="topo-container">
        <input type="text" id="busca" placeholder="O que você deseja buildar hoje?" onkeyup="filtrarProdutos()">
        <button class="btn-filtro-master" onclick="toggleFiltros()">Filtros</button>
    </div>

    <div class="painel-filtros" id="painelFiltros">
        <div class="filter-group"><label>Categoria</label><select id="fTipo" onchange="atualizarSubFiltros()"><option value="">Todas</option><option value="gpu">Placa de Vídeo</option><option value="cpu">Processador</option></select></div>
        <div class="filter-group"><label>Marca</label><select id="fMarca" onchange="filtrarProdutos()" disabled><option value="">Selecione...</option></select></div>
    </div>

    <div class="container" id="produtos">
        <article class="produto" data-id="1" data-tipo="gpu" data-marca="nvidia" data-info='["12GB GDDR6", "Ray Tracing"]'>
            <div class="img-container">
                <img class="img-produto active" src="https://m.media-amazon.com/images/I/61B8S-xnakL._AC_SY450_.jpg">
            </div>
            <h3>RTX 3060</h3><p>Nvidia Galax</p><span class="preco">R$ 2.199</span>
            <div class="btns-produto"><button class="btn-info" onclick="abrirModal(this)">Ver Info</button><button class="btn-buy" onclick="addToCart(1, 'RTX 3060', 2199, 'https://m.media-amazon.com/images/I/61B8S-xnakL._AC_SY450_.jpg')">Comprar</button></div>
        </article>

        <article class="produto" data-id="7" data-tipo="cpu" data-marca="amd" data-info='["AM5", "6 Núcleos", "DDR5"]'>
            <div class="img-container">
                <img class="img-produto active" src="https://m.media-amazon.com/images/I/61ds-pglHHL._AC_SY450_.jpg">
                <img class="img-produto" src="https://m.media-amazon.com/images/I/71tnExiptGL._AC_SY450_.jpg">
            </div>
            <h3>Ryzen 5 7600</h3><p>AMD Ryzen</p><span class="preco">R$ 1.289</span>
            <div class="btns-produto"><button class="btn-info" onclick="abrirModal(this)">Ver Info</button><button class="btn-buy" onclick="addToCart(7, 'Ryzen 5 7600', 1289, 'https://m.media-amazon.com/images/I/61ds-pglHHL._AC_SY450_.jpg')">Comprar</button></div>
        </article>
    </div>
</main>

<footer><p>&copy; 2026 Bits & Bytes Store. Alta Performance Garantida.</p></footer>

<div class="modal" id="modal" onclick="if(event.target == this) fecharModal()">
    <div class="modal-content">
        <div class="modal-img-wrapper"><img id="modalImg" src="" style="max-width:90%"></div>
        <div class="modal-info-box">
            <h2 id="modalNome"></h2>
            <ul id="modalLista"></ul>
            <button class="btn-modal-voltar" onclick="fecharModal()">Voltar</button>
        </div>
    </div>
</div>

<script>
    /* --- MECÂNICA DE SLIDESHOW AUTOMÁTICO (NOVO) --- */
    function iniciarSlideshow() {
        // Busca todos os containers de imagem
        const containers = document.querySelectorAll('.img-container');
        
        containers.forEach(container => {
            const fotos = container.querySelectorAll('.img-produto');
            // Só executa se houver mais de uma foto no produto
            if (fotos.length > 1) {
                let indiceAtual = 0;
                setInterval(() => {
                    fotos[indiceAtual].classList.remove('active');
                    indiceAtual = (indiceAtual + 1) % fotos.length;
                    fotos[indiceAtual].classList.add('active');
                }, 3000); // Muda a foto a cada 3 segundos
            }
        });
    }
    // Inicia assim que a página carrega
    window.onload = iniciarSlideshow;

    /* --- LÓGICA DO CARRINHO (MANTIDA) --- */
    let cart = [];
    function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); }
    function addToCart(id, nome, preco, img) {
        const item = cart.find(i => i.id === id);
        if (item) { item.quantity++; } else { cart.push({ id, nome, preco, img, quantity: 1 }); }
        updateCartUI();
        if(!document.getElementById('cart-sidebar').classList.contains('open')) toggleCart();
    }
    function updateCartUI() {
        const list = document.getElementById('cart-items');
        const count = document.getElementById('cart-count');
        const totalEl = document.getElementById('cart-total');
        list.innerHTML = ''; let total = 0, items = 0;
        cart.forEach(i => {
            total += i.preco * i.quantity; items += i.quantity;
            list.innerHTML += `<div class="cart-item"><img src="${i.img}"><div><h4>${i.nome}</h4><p>R$ ${i.preco}</p></div></div>`;
        });
        count.innerText = items; totalEl.innerText = `R$ ${total.toLocaleString('pt-BR')},00`;
    }

    /* --- LÓGICA IA (MANTIDA E CORRIGIDA) --- */
    function toggleAI() {
        const win = document.getElementById('ai-window');
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
    }
    function sendAIMessage() {
        const input = document.getElementById('ai-input');
        const msgContainer = document.getElementById('ai-messages');
        if(!input.value) return;
        msgContainer.innerHTML += `<div class="msg user">${input.value}</div>`;
        const val = input.value;
        input.value = '';
        setTimeout(() => {
            msgContainer.innerHTML += `<div class="msg bot">Entendido! Analisando sua dúvida sobre "${val}"...</div>`;
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }, 800);
    }

    /* --- FILTROS E MODAL (MANTIDOS) --- */
    function toggleFiltros() { const p = document.getElementById("painelFiltros"); p.style.display = p.style.display === "grid" ? "none" : "grid"; }
    function filtrarProdutos() { /* Lógica de busca original */ }
    function abrirModal(btn) {
        const p = btn.closest(".produto");
        const info = JSON.parse(p.getAttribute("data-info"));
        document.getElementById("modalImg").src = p.querySelector(".img-produto.active").src;
        document.getElementById("modalNome").innerText = p.querySelector("h3").innerText;
        document.getElementById("modalLista").innerHTML = info.map(i => `<li>${i}</li>`).join('');
        document.getElementById("modal").style.display = "flex";
    }
    function fecharModal() { document.getElementById("modal").style.display = "none"; }
</script>

</body>
</html>
